# CD - runs on push/merge to main. Deploys the bundle to Databricks AND runs
# the grading job (so a push triggers a real run - not a timed schedule).
# Adapted from the Marvel CD pipeline for this Free Edition single-target setup.
name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << CFG
          [DEFAULT]
          host = ${{ vars.DATABRICKS_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          CFG

      - name: Deploy Bundle to Databricks (dev)
        env:
          DATABRICKS_BUNDLE_ENV: dev
        run: |
          databricks bundle deploy -t dev

      - name: Run the grading job on Databricks
        env:
          DATABRICKS_BUNDLE_ENV: dev
        run: |
          databricks bundle run grading_job -t dev
