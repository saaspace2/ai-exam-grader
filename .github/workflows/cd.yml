# CD - runs on push/merge to main. Deploys the Databricks bundle.
# Uses Marvel's approach: write ~/.databrickscfg explicitly from GitHub secrets,
# then databricks bundle deploy. Targets 'dev' (the catalog that exists on this
# Free Edition workspace). Add acc/prd targets when those catalogs exist.
name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << CFG
          [DEFAULT]
          host = ${{ vars.DATABRICKS_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          CFG

      - name: Deploy bundle to dev
        run: |
          databricks bundle deploy -t dev