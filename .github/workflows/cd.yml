# CD - runs on push to main. First RUNS THE TESTS (shows the test step right in
# this view), then deploys the bundle to Databricks and runs the grading job.
# Adding the test step here means every deploy shows whether tests passed -
# exactly like the Marvel CD pipeline.
name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # ---- Run the tests BEFORE deploying (shows up in this view) ----
      - name: Run tests
        run: pytest tests/ -v

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << CFG
          [DEFAULT]
          host = ${{ vars.DATABRICKS_HOST }}
          client_id = ${{ secrets.DATABRICKS_CLIENT_ID }}
          client_secret = ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          CFG

      - name: Deploy Bundle to Databricks (dev)
        env:
          DATABRICKS_BUNDLE_ENV: dev
        run: databricks bundle deploy -t dev

      - name: Run the grading job on Databricks
        env:
          DATABRICKS_BUNDLE_ENV: dev
        run: databricks bundle run grading_job -t dev