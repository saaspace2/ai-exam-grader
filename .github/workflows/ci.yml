# CI - runs on every pull request to main. The gatekeeper: only tested code
# merges. Runs OFFLINE tests (no live endpoint / cluster needed) - fast and safe
# on every PR. Endpoint tests (smoke/serving/fuzz/etc.) run later in CD, once a
# real endpoint is deployed. (Structure mirrors the Marvel CI pipeline.)
name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  pytest_and_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install the dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # ------------------------------------------------------------------
      # OFFLINE tests only - no live endpoint, no Databricks cluster needed.
      # Safe and fast on every pull request. (The forced-mock conftest makes
      # these deterministic - no real API calls.)
      # ------------------------------------------------------------------
      - name: Unit tests (smallest pieces of code, in isolation)
        run: |
          pytest tests/unit/ -v

      - name: Full offline suite (catch anything else)
        run: |
          pytest tests/ -v