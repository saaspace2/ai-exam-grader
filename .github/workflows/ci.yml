# CI - runs the test suite on every PULL REQUEST to main (the gatekeeper).
# Only tested code can be merged. Offline tests only (endpoint tests skip
# without ENDPOINT_URL/DBR_TOKEN), so it is fast and needs no secrets.
# (CD runs tests again + deploys on push to main - see cd.yml.)
name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  pytest_and_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install the dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # ---- Part One: standard tests ----
      - name: Unit tests
        run: pytest tests/unit/ -v

      - name: Data quality tests
        run: pytest tests/data/ -v

      - name: Model registry tests
        run: pytest tests/registry/ -v

      - name: Integration tests
        run: pytest tests/integration/ -v

      - name: Regression tests
        run: pytest tests/regression/ -v

      # ---- Part Two: advanced tests (offline ones) ----
      - name: Property-based tests
        run: pytest tests/property_based/ -v

      - name: Snapshot tests
        run: pytest tests/snapshot/ -v

      - name: Mutation-resistance tests
        run: pytest tests/mutation/ -v

      - name: Shadow tests
        run: pytest tests/shadow/ -v

      - name: Canary tests
        run: pytest tests/canary/ -v

      - name: Chaos tests
        run: pytest tests/chaos/ -v

      - name: A/B tests
        run: pytest tests/ab/ -v

      - name: Monitoring tests
        run: pytest tests/monitoring/ -v

      # ---- Full offline suite (endpoint tests skip automatically) ----
      - name: Full offline suite
        run: pytest tests/ -v