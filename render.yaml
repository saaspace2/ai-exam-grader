# Render deployment config. Render auto-deploys this on every push to main.
services:
  - type: web
    name: ai-exam-grader
    runtime: python
    plan: free
    buildCommand: "pip install -e ."
    startCommand: "uvicorn grader.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.11"
      - key: OPENROUTER_API_KEY
        sync: false   # set this secret in the Render dashboard, not in code