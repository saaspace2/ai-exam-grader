# -----------------------------------------------------------------------------
# SETUP JOB - creates catalog/schema/tables/volume.
# SERVERLESS (Free Edition compatible): no job_clusters, tasks run on serverless.
# -----------------------------------------------------------------------------
resources:
  jobs:
    setup_job:
      name: "[${bundle.target}] exam-grader setup"
      tasks:
        - task_key: setup_catalog
          notebook_task:
            notebook_path: ../notebook/01_setup_and_ingest.py
          # no job_cluster_key -> runs on serverless compute